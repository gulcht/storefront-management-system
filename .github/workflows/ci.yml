name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]


permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bunny
          POSTGRES_PASSWORD: bunny1234!
          POSTGRES_DB: storefront_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: django-insecure-test-key-for-ci
          DEBUG: 'True'
          DB_NAME: storefront_db
          DB_USER: bunny
          DB_PASSWORD: bunny1234!
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python backend/manage.py test backend/apps

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: frontend

      - name: Lint
        run: pnpm run lint
        working-directory: frontend

      - name: Build
        run: pnpm run build
        working-directory: frontend

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repo name
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/backend:latest
            ghcr.io/${{ env.REPO_NAME }}/backend:${{ github.sha }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/frontend:latest
            ghcr.io/${{ env.REPO_NAME }}/frontend:${{ github.sha }}

