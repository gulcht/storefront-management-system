name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bunny
          POSTGRES_PASSWORD: bunny1234!
          POSTGRES_DB: storefront_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: django-insecure-test-key-for-ci
          DEBUG: 'True'
          DB_NAME: storefront_db
          DB_USER: bunny
          DB_PASSWORD: bunny1234!
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python backend/manage.py test backend/apps

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: frontend

      - name: Lint
        run: pnpm run lint
        working-directory: frontend

      - name: Build
        run: pnpm run build
        working-directory: frontend
